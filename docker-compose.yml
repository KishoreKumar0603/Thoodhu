version: "3.9"

services:
  mongodb:
    image: mongo:latest
    container_name: thoodhu-mongodb

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:latest
    container_name: thoodhu-redis

    ports:
      - "6379:6379"

volumes:
  mongo_data: